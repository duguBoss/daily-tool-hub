name: Daily Tool Share

on:
  workflow_dispatch:
  schedule:
    # 06:25 Asia/Shanghai = 22:25 UTC (previous day)
    - cron: "25 22 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate daily tool share
        env:
          PRODUCT_HUNT_TOKEN: ${{ secrets.PRODUCT_HUNT_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-3-flash-preview
          GEMINI_MAX_RETRIES: "5"
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          TZ: Asia/Shanghai
          PYTHONUNBUFFERED: "1"
        run: |
          export PYTHONPATH="$PWD:$PYTHONPATH"
          python scripts/daily_tool_hub.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [[ -n "$(git status --porcelain)" ]]; then
            git add output/post.json assets/today data/seen_posts.json
            git commit -m "chore: update daily tool share $(date +'%Y-%m-%d')"
            git push
          else
            echo "No changes to commit."
          fi
